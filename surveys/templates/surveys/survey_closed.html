{% extends "base.html" %}
{% block title %}Sondage clos — Scrutin{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="card card-pad auth-card" style="text-align:center;">
    <div class="glyph" style="font-size:2.2rem;margin-bottom:.8rem;">⏹</div>
    <h1 style="font-size:1.3rem;">Ce sondage n'est plus ouvert</h1>
    <p class="text-muted">« {{ survey.title }} » ne collecte plus de réponses ({{ survey.status_label|lower }}).</p>
    <a href="{% url 'surveys:home' %}" class="btn btn-outline mt-2">Retour à l'accueil</a>
  </div>
</div>
{% endblock %}
